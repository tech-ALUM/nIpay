<!-- @dsCard group="Mockup" name="Nuova transazione" subtitle="Spesa/Entrata/Trasferimento, categorie, campi custom" -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--coral:#FF6F61;--teal:#0E7C86;--ink:#15181D;--paper:#F7F8FA;--surface:#fff;--muted:#6B7280;--line:#E5E7EB}
  *{box-sizing:border-box}
  body{margin:0;background:#e9eaee;font-family:'Inter',system-ui,sans-serif;color:var(--ink);display:flex;justify-content:center;padding:20px}
  .phone{width:390px;height:844px;background:var(--paper);border-radius:36px;border:8px solid var(--ink);overflow:hidden;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:12px;padding:16px 20px 8px}
  .top h1{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:0;flex:1}
  .x{color:var(--muted);font-size:18px}
  .seg{display:flex;margin:8px 20px;background:#EDEEF1;border-radius:12px;padding:3px}
  .seg div{flex:1;text-align:center;font-size:13px;padding:8px 0;border-radius:10px;color:var(--muted)}
  .seg .on{background:var(--coral);color:#fff;font-weight:600;font-family:'Space Grotesk',sans-serif}
  .amount{text-align:center;padding:18px 0 6px}
  .amount .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:40px;color:var(--coral)}
  .amount .cur{font-size:14px;color:var(--muted)}
  .sec{margin:10px 20px 0}
  .sec .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
  .cats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:10px 4px;text-align:center;font-size:11px;color:var(--muted)}
  .cat span{display:block;font-size:20px;margin-bottom:3px}
  .cat.on{border-color:var(--coral);background:#FFF0EE;color:var(--ink);font-weight:600}
  .row{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:8px}
  .row .k{color:var(--muted)}
  .pill{font-size:11px;padding:3px 10px;border-radius:999px;background:#DFF0F1;color:var(--teal);margin-left:4px}
  .save{margin:auto 20px 24px;background:var(--coral);color:#fff;border-radius:16px;text-align:center;padding:15px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;box-shadow:0 6px 16px rgba(255,111,97,.35)}
</style>
<div class="phone">
  <div class="top"><h1>Nuova transazione</h1><span class="x">✕</span></div>
  <div class="seg"><div class="on">Spesa</div><div>Entrata</div><div>Trasferim.</div></div>
  <div class="amount"><div class="v">42,50</div><div class="cur">EUR · Conto ▾ · oggi ▾</div></div>
  <div class="sec">
    <div class="l">Categoria</div>
    <div class="cats">
      <div class="cat on"><span>🛒</span>Spesa</div>
      <div class="cat"><span>🍽</span>Ristoranti</div>
      <div class="cat"><span>⛽</span>Trasporti</div>
      <div class="cat"><span>🏠</span>Casa</div>
      <div class="cat"><span>🎬</span>Svago</div>
      <div class="cat"><span>💊</span>Salute</div>
      <div class="cat"><span>👕</span>Shopping</div>
      <div class="cat" style="border-style:dashed"><span>＋</span>Nuova</div>
    </div>
  </div>
  <div class="sec">
    <div class="l">Dettagli</div>
    <div class="row"><span class="k">Descrizione</span><span>Esselunga</span></div>
    <div class="row"><span class="k">Tag</span><span><span class="pill">#casa</span><span class="pill">＋</span></span></div>
    <div class="row"><span class="k">Metodo pagamento <i style="font-size:10px">(campo custom)</i></span><span>Carta ▾</span></div>
    <div class="row"><span class="k">Scontrino</span><span>📷 Aggiungi foto</span></div>
  </div>
  <div class="save">Salva spesa</div>
</div>
