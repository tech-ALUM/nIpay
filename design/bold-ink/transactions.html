<!-- @dsCard group="Bold Ink — Schermate" name="Transazioni" subtitle="Dark + Light affiancati" -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#e9eaee;font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center;gap:24px;padding:20px;flex-wrap:wrap}
  .phone{width:390px;height:844px;border-radius:36px;border:8px solid #000;overflow:hidden;display:flex;flex-direction:column;position:relative;
         background:var(--bg);color:var(--text)}
  .dark{--bg:#101318;--surf:#1A1F27;--text:#F2F4F8;--mut:#8B93A1;--line:#2A313D;--chipbg:#1A1F27;--chipon:#F2F4F8;--chipontx:#101318;
        --coral:#FF8A7E;--coralA:#FF6F61;--teal:#3FC5CF;--icA:rgba(255,111,97,.18);--icB:rgba(255,190,80,.15);--icC:rgba(124,92,191,.22);--icD:rgba(23,162,174,.18);--icE:rgba(139,147,161,.15);--sh:none}
  .light{--bg:#F6F7F9;--surf:#FFFFFF;--text:#171B21;--mut:#79818F;--line:#E8EAEE;--chipbg:#FFFFFF;--chipon:#171B21;--chipontx:#FFFFFF;
        --coral:#E8503F;--coralA:#FF6F61;--teal:#0E7C86;--icA:#FFEDEB;--icB:#FFF4DC;--icC:#EFEAF9;--icD:#E4F2F3;--icE:#EDEFF2;--sh:0 6px 18px rgba(21,24,29,.05)}
  .top{background:var(--surf);border-bottom:1px solid var(--line);padding:18px 20px 12px}
  .top h1{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:0 0 10px}
  .search{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:13px;color:var(--mut);margin-bottom:10px}
  .chips{display:flex;gap:8px;overflow:hidden}
  .chip{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--chipbg);white-space:nowrap;color:var(--mut)}
  .chip.on{background:var(--chipon);color:var(--chipontx);border-color:var(--chipon);font-weight:600}
  .list{flex:1;overflow:hidden;padding:6px 20px}
  .day{display:flex;justify-content:space-between;align-items:baseline;margin:14px 2px 6px}
  .day .d{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500}
  .day .s{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mut)}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--sh)}
  .t{display:flex;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--line)}
  .t:last-child{border-bottom:none}
  .ic{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .tt{flex:1;min-width:0}.n{font-size:13px;font-weight:500}.c{font-size:11px;color:var(--mut);margin-top:1px}
  .tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;background:var(--icD);color:var(--teal);margin-left:4px}
  .amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;text-align:right}
  .fab{position:absolute;right:20px;bottom:86px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#FF8A7E,#FF6F61);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(255,111,97,.4)}
  .nav{height:64px;background:var(--surf);border-top:1px solid var(--line);display:flex}
  .nav div{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--mut);gap:2px}
  .nav div.on{color:var(--coralA);font-weight:600}.nav span{font-size:18px}
</style>
<template id="screen">
  <div class="top">
    <h1>Transazioni</h1>
    <div class="search">🔎 Cerca per testo, note, campi custom…</div>
    <div class="chips">
      <div class="chip on">Luglio 2026 ▾</div><div class="chip">Portafoglio ▾</div><div class="chip">Categoria ▾</div><div class="chip">Tag ▾</div>
    </div>
  </div>
  <div class="list">
    <div class="day"><span class="d">Oggi · 15 luglio</span><span class="s">−58,30 €</span></div>
    <div class="card">
      <div class="t"><div class="ic" style="background:var(--icA)">🛒</div><div class="tt"><div class="n">Esselunga <span class="tag">#casa</span></div><div class="c">Spesa › Supermercato · Conto</div></div><div class="amt" style="color:var(--coral)">−42,50</div></div>
      <div class="t"><div class="ic" style="background:var(--icB)">☕</div><div class="tt"><div class="n">Colazione bar</div><div class="c">Ristoranti › Bar · Contanti</div></div><div class="amt" style="color:var(--coral)">−15,80</div></div>
    </div>
    <div class="day"><span class="d">Ieri · 14 luglio</span><span class="s">−89,90 €</span></div>
    <div class="card">
      <div class="t"><div class="ic" style="background:var(--icC)">⛽</div><div class="tt"><div class="n">Benzina <span class="tag">#auto</span></div><div class="c">Trasporti › Carburante · Conto</div></div><div class="amt" style="color:var(--coral)">−65,00</div></div>
      <div class="t"><div class="ic" style="background:var(--icA)">🎬</div><div class="tt"><div class="n">Cinema</div><div class="c">Svago · Contanti</div></div><div class="amt" style="color:var(--coral)">−24,90</div></div>
    </div>
    <div class="day"><span class="d">1 luglio</span><span class="s">+1.750,00 €</span></div>
    <div class="card">
      <div class="t"><div class="ic" style="background:var(--icD)">💼</div><div class="tt"><div class="n">Stipendio</div><div class="c">Entrate › Lavoro · Conto</div></div><div class="amt" style="color:var(--teal)">+1.850,00</div></div>
      <div class="t"><div class="ic" style="background:var(--icE)">⇄</div><div class="tt"><div class="n">Prelievo bancomat</div><div class="c">Trasferimento · Conto → Contanti</div></div><div class="amt" style="color:var(--mut)">100,00</div></div>
    </div>
  </div>
  <div class="fab">+</div>
  <div class="nav">
    <div><span>⌂</span>Home</div><div class="on"><span>☰</span>Transazioni</div><div><span>◔</span>Statistiche</div><div><span>⚙</span>Altro</div>
  </div>
</template>
<div class="phone dark"></div>
<div class="phone light"></div>
<script>
  const tpl = document.getElementById('screen');
  document.querySelectorAll('.phone').forEach(p => p.appendChild(tpl.content.cloneNode(true)));
</script>
