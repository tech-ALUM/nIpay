name: iOS

# Build iOS su runner macOS (Xcode non esiste su Linux).
# Produce una .ipa NON firmata come artifact: per installarla su un
# dispositivo serve firmarla (TestFlight con account Apple Developer,
# oppure sideload con AltStore/Sideloadly). Vedi README.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'pubspec.yaml'
      - '.github/workflows/ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr nipay-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: nipay-ios-unsigned
          path: nipay-unsigned.ipa
          retention-days: 30
