name: nipay
description: "nIpay — tracciamento spese ed entrate multi-portafoglio (team ALUM)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  archive: ^3.6.1
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  excel: ^4.0.6
  file_selector: ^1.1.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  google_fonts: ^8.2.0
  image_picker: ^1.2.3
  intl: any
  path_provider: ^2.1.6
  pdf: ^3.8.4
  share_plus: ^13.2.1
  shared_preferences: ^2.5.5
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.1
  flutter_launcher_icons: ^0.9.3

flutter:
  uses-material-design: true
  generate: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#15181D"
  adaptive_icon_foreground: "assets/icon/icon.png"
